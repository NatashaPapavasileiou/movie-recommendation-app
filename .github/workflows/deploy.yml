name: CI/CD Pipeline to AWS

# 1. Πότε ενεργοποιείται το Pipeline
on:
  push:
    branches:
      - main # Το pipeline θα τρέχει αυτόματα κάθε φορά που κάνεις push στο main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Ο remote server του GitHub που θα εκτελέσει τις εντολές

    steps:
      # Βήμα 1: Κατέβασμα του κώδικα από το GitHub Repository στον runner server
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Βήμα 2: Εγκατάσταση του περιβάλλοντος Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Ενεργοποίηση cache για πιο γρήγορη εγκατάσταση των πακέτων

      # Βήμα 3: Καθαρή εγκατάσταση τωνDependencies (πακέτων) της εφαρμογής
      - name: Install Dependencies
        run: npm ci

      # Βήμα 4: Έλεγχος και Build της React εφαρμογής (Παραγωγή του στατικού φακέλου dist)
      # Εδώ εισάγουμε με ασφάλεια τις μεταβλητές περιβάλλοντος από τα GitHub Secrets
      - name: Build Application
        run: npm run build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Βήμα 5: Σύνδεση και Αυθεντικοποίηση με το AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1 # Ή το region που θα επιλέξεις στο AWS (π.Check: π.χ. us-east-1)

      # Βήμα 6: Συγχρονισμός και μεταφόρτωση του φακέλου dist στον AWS S3 Bucket
      - name: Deploy static site to AWS S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete